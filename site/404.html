<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found · Whisperer</title>
  <meta name="description" content="The page you're looking for doesn't exist.">
  <link rel="canonical" href="https://stonedmoose.github.io/iWhisperer/404.html" />
  <meta name="author" content="Julien Lhermite" />
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/png" href="assets/icon.png">
  <style>
    :root {
      --bg: #0a0a0f;
      --bg-card: #12121a;
      --text: #e8e8ed;
      --text-muted: #8888a0;
      --accent: #6c5ce7;
      --accent-glow: rgba(108, 92, 231, 0.3);
      --accent2: #00cec9;
      --border: rgba(255, 255, 255, 0.06);
      --radius: 16px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    body::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(ellipse at 30% 20%, rgba(108, 92, 231, 0.08) 0%, transparent 50%),
                  radial-gradient(ellipse at 70% 80%, rgba(0, 206, 201, 0.05) 0%, transparent 50%);
      z-index: -1;
    }

    nav {
      position: fixed;
      top: 0;
      width: 100%;
      padding: 16px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(10, 10, 15, 0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      z-index: 100;
    }
    nav .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 18px;
      text-decoration: none;
      color: var(--text);
    }
    nav .logo img { width: 28px; height: 28px; border-radius: 6px; }
    nav .links { display: flex; gap: 24px; align-items: center; }
    nav .links a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }
    nav .links a:hover { color: var(--text); }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 100px 24px 80px;
    }

    .error-code {
      font-size: clamp(80px, 20vw, 160px);
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
    }

    .main h1 {
      font-size: clamp(20px, 4vw, 28px);
      font-weight: 700;
      margin-bottom: 12px;
    }

    .main p {
      color: var(--text-muted);
      font-size: 16px;
      max-width: 400px;
      margin-bottom: 36px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.25s ease;
      cursor: pointer;
      border: none;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #845ef7);
      color: #fff;
      box-shadow: 0 4px 20px var(--accent-glow);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 30px var(--accent-glow); }

    :focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; border-radius: 4px; }

    footer {
      padding: 32px 24px;
      text-align: center;
      border-top: 1px solid var(--border);
    }
    footer p { color: var(--text-muted); font-size: 13px; }
    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    @media (max-width: 640px) {
      nav { padding: 12px 16px; }
      nav .links a { display: none; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="logo">
      <img src="assets/icon.png" alt="Whisperer">
      Whisperer
    </a>
    <div class="links">
      <a href="index.html">Home</a>
      <a href="tutorial.html">Tutorial</a>
      <a href="privacy.html">Privacy</a>
    </div>
  </nav>

  <div class="main">
    <div class="error-code">404</div>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist or may have been moved.</p>
    <a href="index.html" class="btn btn-primary">Go Home</a>
  </div>

  <footer>
    <p>
      Made by <a href="https://github.com/stonedMoose">Julien Lhermite</a> &middot;
      <a href="https://github.com/stonedMoose/iWhisperer">Source Code</a> &middot;
      <a href="privacy.html">Privacy Policy</a> &middot;
      Powered by <a href="https://github.com/ggerganov/whisper.cpp">whisper.cpp</a>
    </p>
  </footer>

</body>
</html>
