name: iWhisperer
options:
  bundleIdPrefix: com.julienlhermite
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

targets:
  iWhisperer:
    type: application
    platform: iOS
    sources:
      - path: Sources
    resources:
      - path: Resources
    settings:
      base:
        SWIFT_INCLUDE_PATHS: $(PROJECT_DIR)/Vendor/CWhisper
        HEADER_SEARCH_PATHS: $(PROJECT_DIR)/Vendor/whisper-built/include
        LIBRARY_SEARCH_PATHS: $(PROJECT_DIR)/Vendor/whisper-built/lib
        OTHER_LDFLAGS: ["-lwhisper", "-lggml", "-lggml-base", "-lggml-cpu", "-lggml-metal", "-lc++", "-framework", "Accelerate", "-framework", "Metal", "-framework", "MetalKit"]
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "iWhisperer needs microphone access to record your voice for transcription."
        INFOPLIST_KEY_CFBundleDisplayName: "iWhisperer"
        INFOPLIST_KEY_UIBackgroundModes: "audio"
        INFOPLIST_KEY_NSSupportsLiveActivities: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.julienlhermite.iWhisperer
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - target: iWhispererWidgetExtension
    entitlements:
      path: iWhisperer.entitlements
      properties: {}

  iWhispererWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: iWhispererWidgetExtension
      - path: Sources/LiveActivity
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.julienlhermite.iWhisperer.WidgetExtension
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSExtension_NSExtensionPointIdentifier: com.apple.widgetkit-extension
        TARGETED_DEVICE_FAMILY: "1"
