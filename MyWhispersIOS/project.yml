name: MyWhispersIOS
options:
  bundleIdPrefix: com.julienlhermite
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

targets:
  MyWhispersIOS:
    type: application
    platform: iOS
    sources:
      - path: Sources
    resources:
      - path: Resources
    settings:
      base:
        SWIFT_INCLUDE_PATHS: $(PROJECT_DIR)/Vendor/CWhisper
        HEADER_SEARCH_PATHS: $(PROJECT_DIR)/Vendor/whisper-built/include
        LIBRARY_SEARCH_PATHS: $(PROJECT_DIR)/Vendor/whisper-built/lib
        OTHER_LDFLAGS: ["-lwhisper", "-lggml", "-lggml-base", "-lggml-cpu", "-lggml-metal", "-lc++", "-framework", "Accelerate", "-framework", "Metal", "-framework", "MetalKit"]
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "MyWhispers needs microphone access to record your voice for transcription."
        INFOPLIST_KEY_UIBackgroundModes: "audio"
        PRODUCT_BUNDLE_IDENTIFIER: com.julienlhermite.MyWhispersIOS
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        TARGETED_DEVICE_FAMILY: "1"
    dependencies: []
    entitlements:
      path: MyWhispersIOS.entitlements
      properties: {}
